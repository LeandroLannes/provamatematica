<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice Adventure 🚀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #0f0e17;
    --card: #1a1929;
    --card2: #222136;
    --border: #2e2c4a;
    --text: #eaeaea;
    --muted: #8b89a8;
    --mat: #ff6b6b;
    --sci: #4ecdc4;
    --his: #ffd93d;
    --geo: #6bcb77;
    --purple: #a855f7;
    --correct: #4ade80;
    --wrong: #f87171;
    --radius: 16px;
    --gap: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HEADER ── */
  .app-header {
    text-align: center;
    padding: 24px 0 20px;
  }
  .app-header h1 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #a855f7, #ff6b6b, #ffd93d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .app-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* ── DISCIPLINE GRID ── */
  .disc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    margin-top: 8px;
  }
  .disc-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    text-align: center;
    transition: transform .15s, border-color .15s;
    user-select: none;
  }
  .disc-card:active { transform: scale(.96); }
  .disc-card .emoji { font-size: 36px; display: block; margin-bottom: 8px; }
  .disc-card .name { font-weight: 800; font-size: 15px; }
  .disc-card .sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .disc-card[data-disc="mat"]  { border-color: var(--mat);  }
  .disc-card[data-disc="sci"]  { border-color: var(--sci);  }
  .disc-card[data-disc="his"]  { border-color: var(--his);  }
  .disc-card[data-disc="geo"]  { border-color: var(--geo);  }
  .disc-card[data-disc="mat"]:hover  { background: #2a1f1f; }
  .disc-card[data-disc="sci"]:hover  { background: #1a2a2a; }
  .disc-card[data-disc="his"]:hover  { background: #2a2a1a; }
  .disc-card[data-disc="geo"]:hover  { background: #1a2a1f; }

  /* ── TOPIC LIST ── */
  .topic-list { margin-top: 8px; display: flex; flex-direction: column; gap: var(--gap); }
  .topic-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform .12s;
  }
  .topic-btn:active { transform: scale(.97); }
  .topic-btn .t-emoji { font-size: 22px; flex-shrink: 0; }
  .topic-btn .t-sub { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* ── MODE SELECT ── */
  .mode-grid { display: flex; flex-direction: column; gap: var(--gap); margin-top: 8px; }
  .mode-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    transition: border-color .12s, transform .12s;
  }
  .mode-btn:active { transform: scale(.97); }
  .mode-btn .m-emoji { font-size: 24px; }
  .mode-btn .m-desc { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* ── BACK + NAV ── */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: var(--card2);
    border: none;
    border-radius: 10px;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-title { font-weight: 800; font-size: 16px; flex: 1; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── QUIZ ── */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 8px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 8px;
    background: var(--purple);
    transition: width .3s ease;
  }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
  }
  .question-num {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.45;
  }
  .question-hint {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn .opt-letter {
    background: var(--border);
    border-radius: 8px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct  { border-color: var(--correct); background: #052214; }
  .option-btn.wrong    { border-color: var(--wrong);   background: #200d0d; }
  .option-btn.correct .opt-letter { background: var(--correct); color: #000; }
  .option-btn.wrong   .opt-letter { background: var(--wrong);   color: #000; }

  .feedback-bar {
    border-radius: 12px;
    padding: 14px 16px;
    font-weight: 700;
    font-size: 15px;
    margin-top: 12px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback-bar.correct-fb { background: #052214; border: 2px solid var(--correct); color: var(--correct); display: flex; }
  .feedback-bar.wrong-fb   { background: #200d0d; border: 2px solid var(--wrong);   color: var(--wrong);   display: flex; }
  .feedback-bar .fb-icon { font-size: 20px; }
  .feedback-bar .fb-text { font-size: 13px; }

  .next-btn {
    width: 100%;
    background: var(--purple);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    padding: 16px;
    cursor: pointer;
    margin-top: 16px;
    display: none;
    transition: opacity .12s;
  }
  .next-btn:hover { opacity: .88; }

  /* ── RESULT ── */
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-grade {
    font-size: 56px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .result-label { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .result-score { font-size: 18px; font-weight: 800; }
  .result-emoji { font-size: 40px; margin-top: 12px; display: block; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }
  .result-btn.primary { background: var(--purple); border-color: var(--purple); color: #fff; }

  /* ── ERROR LOG ── */
  .error-log-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .error-log-sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .error-item {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .error-item .ei-q { font-size: 14px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .ei-row { font-size: 13px; margin-bottom: 4px; display: flex; gap: 6px; }
  .ei-row .ei-label { font-weight: 800; flex-shrink: 0; }
  .ei-row.wrong-ans { color: var(--wrong); }
  .ei-row.right-ans { color: var(--correct); }
  .clear-errors-btn {
    background: #200d0d;
    border: 2px solid var(--wrong);
    border-radius: 12px;
    color: var(--wrong);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 15px;
  }
  .empty-state .es-emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 2px solid var(--border);
    display: flex;
    max-width: 480px;
    margin: 0 auto;
  }
  .bn-btn {
    flex: 1;
    padding: 12px 0 10px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .12s;
  }
  .bn-btn .bn-icon { font-size: 20px; }
  .bn-btn.active { color: var(--purple); }

  body { padding-bottom: 70px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--card);
    border: 2px solid var(--purple);
    border-radius: 12px;
    padding: 12px 20px;
    font-weight: 700;
    font-size: 14px;
    transition: transform .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── COLOR TAGS ── */
  .tag {
    display: inline-block;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 800;
    margin-left: 6px;
  }
  .tag-mat { background: #3a1515; color: var(--mat); }
  .tag-sci { background: #0f2a28; color: var(--sci); }
  .tag-his { background: #2a2710; color: var(--his); }
  .tag-geo { background: #0f2a18; color: var(--geo); }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alice Estuda">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bn-btn active" id="bnHome" onclick="showMainMenu()">
    <span class="bn-icon">🏠</span>Home
  </button>
  <button class="bn-btn" id="bnErrors" onclick="showErrors()">
    <span class="bn-icon">📋</span>Erros
  </button>
</nav>

<!-- ══════════════════ SCREEN: HOME ══════════════════ -->
<div class="screen active" id="screenHome">
  <div class="app-header">
    <h1>Alice Adventure 🚀</h1>
    <p>2º Bimestre — escolha a disciplina!</p>
  </div>
  <p class="section-label">Disciplinas</p>
  <div class="disc-grid">
    <div class="disc-card" data-disc="mat" onclick="showTopics('mat')">
      <span class="emoji">🔢</span>
      <div class="name">Matemática</div>
      <div class="sub">Inglês</div>
    </div>
    <div class="disc-card" data-disc="sci" onclick="showTopics('sci')">
      <span class="emoji">🔬</span>
      <div class="name">Science</div>
      <div class="sub">Inglês</div>
    </div>
    <div class="disc-card" data-disc="his" onclick="showTopics('his')">
      <span class="emoji">📚</span>
      <div class="name">História</div>
      <div class="sub">Português</div>
    </div>
    <div class="disc-card" data-disc="geo" onclick="showTopics('geo')">
      <span class="emoji">🗺️</span>
      <div class="name">Geografia</div>
      <div class="sub">Português</div>
    </div>
  </div>
</div>

<!-- ══════════════════ SCREEN: TOPICS ══════════════════ -->
<div class="screen" id="screenTopics">
  <div class="nav-row">
    <button class="back-btn" onclick="showMainMenu()">← Voltar</button>
    <span class="nav-title" id="topicsTitle"></span>
  </div>
  <p class="section-label">Tópicos</p>
  <div class="topic-list" id="topicList"></div>
</div>

<!-- ══════════════════ SCREEN: MODE ══════════════════ -->
<div class="screen" id="screenMode">
  <div class="nav-row">
    <button class="back-btn" id="modeBack">← Voltar</button>
    <span class="nav-title" id="modeTitle"></span>
  </div>
  <p class="section-label">Modo de jogo</p>
  <div class="mode-grid" id="modeGrid"></div>
</div>

<!-- ══════════════════ SCREEN: QUIZ ══════════════════ -->
<div class="screen" id="screenQuiz">
  <div class="nav-row">
    <button class="back-btn" onclick="quitQuiz()">✕ Sair</button>
    <span class="nav-title" id="quizTitle"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="question-card">
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
    <div class="question-hint" id="questionHint"></div>
  </div>
  <div class="options-list" id="optionsList"></div>
  <div class="feedback-bar" id="feedbackBar">
    <span class="fb-icon" id="fbIcon"></span>
    <div>
      <div id="fbMain"></div>
      <div class="fb-text" id="fbSub"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima →</button>
</div>

<!-- ══════════════════ SCREEN: RESULT ══════════════════ -->
<div class="screen" id="screenResult">
  <div class="result-card">
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-label">Nota simulada (de 10)</div>
    <div class="result-score" id="resultScore"></div>
    <span class="result-emoji" id="resultEmoji"></span>
  </div>
  <div class="result-actions">
    <button class="result-btn primary" onclick="retryQuiz()">🔄 Tentar de novo</button>
    <button class="result-btn" onclick="showErrors()">📋 Ver meus erros</button>
    <button class="result-btn" onclick="showMainMenu()">🏠 Menu principal</button>
  </div>
</div>

<!-- ══════════════════ SCREEN: ERRORS ══════════════════ -->
<div class="screen" id="screenErrors">
  <div class="nav-row">
    <button class="back-btn" onclick="showMainMenu()">← Voltar</button>
    <span class="nav-title">Meus Erros</span>
  </div>
  <div class="error-log-title">📋 Painel de Erros</div>
  <div class="error-log-sub">Aqui ficam guardadas as questões que você errou.</div>
  <div id="errorLogList"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA — QUESTÕES POR DISCIPLINA / TÓPICO / MODO
// ══════════════════════════════════════════════

const DISCIPLINES = {
  mat: { name: "Matemática 🔢", color: "mat", topics: [
    { id:"arrays",   name:"Arrays",              emoji:"⬛", modes:["mc","match"] },
    { id:"addition", name:"Adição",              emoji:"➕", modes:["mc","fill"] },
    { id:"equal",    name:"Equal or Not Equal",  emoji:"⚖️", modes:["mc"] },
    { id:"tens",     name:"Tens & Ones",         emoji:"🔟", modes:["mc","fill"] },
    { id:"tally",    name:"Tally & Graphs",      emoji:"📊", modes:["mc"] },
    { id:"days",     name:"Days & Months",       emoji:"📅", modes:["mc","fill"] },
    { id:"money",    name:"Money",               emoji:"💰", modes:["mc"] },
    { id:"prob",     name:"Probability",         emoji:"🎲", modes:["mc"] },
    { id:"picto",    name:"Pictograms",          emoji:"🖼️", modes:["mc"] },
  ]},
  sci: { name: "Science 🔬", color: "sci", topics: [
    { id:"forces",   name:"Squash, Bend & Stretch", emoji:"🤸", modes:["mc","fill"] },
    { id:"heat",     name:"Heat & Cool",         emoji:"🌡️", modes:["mc"] },
    { id:"dissolve", name:"Dissolve in Water",   emoji:"💧", modes:["mc"] },
    { id:"rocks",    name:"Rocks",               emoji:"🪨", modes:["mc","fill"] },
    { id:"manmade",  name:"Natural vs Man-made", emoji:"🏭", modes:["mc"] },
  ]},
  his: { name: "História 📚", color: "his", topics: [
    { id:"fontes",   name:"Fontes Históricas",   emoji:"📜", modes:["mc","fill"] },
    { id:"bairros",  name:"Bairros e Ruas",      emoji:"🏘️", modes:["mc"] },
    { id:"profissoes", name:"Profissões",        emoji:"👷", modes:["mc","fill"] },
    { id:"trabalho", name:"Trabalho no Campo",   emoji:"🌾", modes:["mc"] },
    { id:"lei",      name:"Leis e IA",           emoji:"⚖️", modes:["mc"] },
  ]},
  geo: { name: "Geografia 🗺️", color: "geo", topics: [
    { id:"bairro",   name:"O que é um Bairro",  emoji:"🏘️", modes:["mc","fill"] },
    { id:"tipos",    name:"Tipos de Bairro",     emoji:"🏙️", modes:["mc"] },
    { id:"zonas",    name:"Zona Rural × Urbana", emoji:"🌾", modes:["mc","fill"] },
    { id:"vizinhos", name:"Vizinhos e Convivência", emoji:"🤝", modes:["mc"] },
    { id:"periodo",  name:"Períodos do Dia",     emoji:"☀️", modes:["mc","fill"] },
    { id:"profgeo",  name:"Profissões por Turno",emoji:"👩‍⚕️", modes:["mc"] },
    { id:"estab",    name:"Estabelecimentos",    emoji:"🏪", modes:["mc","fill"] },
    { id:"campo",    name:"Vida no Campo",       emoji:"🐄", modes:["mc"] },
    { id:"extrat",   name:"Extrativismo",        emoji:"⛏️", modes:["mc","fill"] },
    { id:"repres",   name:"Representar Espaços", emoji:"🗺️", modes:["mc"] },
  ]},
};

const MODES = {
  mc:    { name:"Quiz Múltipla Escolha", emoji:"🎯", desc:"4 opções, escolha a certa" },
  fill:  { name:"Completar a Frase",    emoji:"✏️", desc:"Escolha a palavra que falta" },
  match: { name:"Associar",             emoji:"🔗", desc:"Ligue o conceito ao exemplo" },
};

// ── QUESTION BANK ──────────────────────────────────────────────

const QUESTIONS = {

  // ──────── MATEMÁTICA ────────

  mat_arrays: [
    { q:"What does a 3×4 array mean?", a:"3 rows and 4 columns", opts:["3 rows and 4 columns","4 rows and 3 items","7 total things","3 rows and 4 rows"], hint:"Rows × Columns" },
    { q:"An array has 2 rows and 5 columns. How many items in total?", a:"10", opts:["10","7","12","15"], hint:"Multiply rows × columns" },
    { q:"Which multiplication matches a 4×3 array?", a:"4 × 3 = 12", opts:["4 × 3 = 12","3 × 4 = 7","4 + 3 = 7","4 × 3 = 10"], hint:"Rows × Columns = Total" },
    { q:"An array has 3 rows and 3 columns. How many items?", a:"9", opts:["9","6","12","3"], hint:"3 × 3 = ?" },
    { q:"Which describes this array: ⬛⬛ / ⬛⬛ / ⬛⬛ ?", a:"3 rows, 2 columns", opts:["3 rows, 2 columns","2 rows, 3 columns","6 rows","2 columns, 2 rows"], hint:"Count rows top to bottom, columns left to right" },
    { q:"5 rows and 2 columns. Total?", a:"10", opts:["10","7","15","12"], hint:"5 × 2 = ?" },
    { q:"Arrays help us understand which math operation?", a:"Multiplication", opts:["Multiplication","Division","Subtraction","Fractions"] },
  ],

  mat_addition: [
    { q:"What is 47 + 36?", a:"83", opts:["83","73","93","80"], hint:"Add ones first: 7+6=13, carry 1" },
    { q:"What is 58 + 25?", a:"83", opts:["83","73","93","80"] },

    { q:"Extrativismo ANIMAL é:", a:"Retirar animais da natureza (como pescar)", opts:["Retirar animais da natureza (como pescar)","Criar vacas em fazenda","Plantar frutas","Extrair sal"] },
    { q:"Extrativismo MINERAL é:", a:"Extrair rochas, areia, ouro e minerais da terra", opts:["Extrair rochas, areia, ouro e minerais da terra","Colher frutas da floresta","Pescar peixes","Cortar madeira"] },
    { q:"A extração de cocos de uma palmeira é extrativismo:", a:"Vegetal", opts:["Vegetal","Animal","Mineral","Nenhum"] },
    { q:"A extração de sal do mar é extrativismo:", a:"Mineral", opts:["Mineral","Vegetal","Animal","Industrial"] },
    { q:"A pesca em rio é extrativismo:", a:"Animal", opts:["Animal","Vegetal","Mineral","Agrícola"] },

    { q:"Uma foto tirada de frente mostra uma visão:", a:"Frontal", opts:["Frontal","Vertical","Oblíqua","Aérea"] },
    { q:"Uma visão OBLÍQUA é:", a:"Vista de um ângulo diagonal (nem de frente, nem de cima)", opts:["Vista de um ângulo diagonal (nem de frente, nem de cima)","Vista de frente","Vista de cima","Vista de baixo"] },
    { q:"Uma maquete é:", a:"Um modelo menor do espaço real", opts:["Um modelo menor do espaço real","Uma fotografia","Um mapa plano","Um desenho em papel"] },
    { q:"Uma PLANTA BAIXA mostra o espaço visto:", a:"De cima (visão vertical)", opts:["De cima (visão vertical)","De frente","De lado","Em perspectiva diagonal"] },
    { q:"Satélites produzem imagens da superfície da Terra para criar:", a:"Mapas", opts:["Mapas","Maquetes","Pinturas","Desenhos à mão"] },
    { q:"Qual representação mostra o espaço com mais detalhes de textura e cor real?", a:"Fotografia", opts:["Fotografia","Mapa","Planta baixa","Maquete em papel"] },
  ],
};

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════

let state = {
  disc: null,
  topic: null,
  mode: null,
  questions: [],
  current: 0,
  score: 0,
  answered: false,
  errors: JSON.parse(localStorage.getItem('alice_errors') || '[]'),
};

let lastDisc = null;

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // nav highlight
  document.getElementById('bnHome').classList.toggle('active', id !== 'screenErrors');
  document.getElementById('bnErrors').classList.toggle('active', id === 'screenErrors');
  window.scrollTo(0,0);
}

function showMainMenu() {
  showScreen('screenHome');
}

function showTopics(disc) {
  state.disc = disc;
  lastDisc = disc;
  const d = DISCIPLINES[disc];
  document.getElementById('topicsTitle').textContent = d.name;
  const list = document.getElementById('topicList');
  list.innerHTML = '';
  d.topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `<span class="t-emoji">${t.emoji}</span><div><div>${t.name}</div><div class="t-sub">${t.modes.length} modo(s) disponível</div></div>`;
    btn.onclick = () => showModes(t);
    list.appendChild(btn);
  });
  showScreen('screenTopics');
}

function showModes(topic) {
  state.topic = topic;
  document.getElementById('modeTitle').textContent = topic.name;
  document.getElementById('modeBack').onclick = () => showTopics(state.disc);
  const grid = document.getElementById('modeGrid');
  grid.innerHTML = '';
  topic.modes.forEach(m => {
    const info = MODES[m];
    const btn = document.createElement('button');
    btn.className = 'mode-btn';
    btn.innerHTML = `<span class="m-emoji">${info.emoji}</span><div><div>${info.name}</div><div class="m-desc">${info.desc}</div></div>`;
    btn.onclick = () => startQuiz(m);
    grid.appendChild(btn);
  });
  showScreen('screenMode');
}

// ════════════════════════════════════════════
//  QUIZ ENGINE
// ════════════════════════════════════════════

function startQuiz(mode) {
  state.mode = mode;
  const key = `${state.disc}_${state.topic.id}`;
  let bank = QUESTIONS[key] || [];
  // shuffle
  bank = bank.slice().sort(() => Math.random() - 0.5);
  state.questions = bank.slice(0, Math.min(8, bank.length));
  state.current = 0;
  state.score = 0;
  document.getElementById('quizTitle').textContent = state.topic.name;
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  state.answered = false;

  // progress
  document.getElementById('progressBar').style.width = `${(state.current/total)*100}%`;
  document.getElementById('questionNum').textContent = `Questão ${state.current+1} de ${total}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionHint').textContent = q.hint ? `💡 ${q.hint}` : '';

  // options
  const opts = document.getElementById('optionsList');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  // shuffle options
  const shuffled = (q.opts || []).slice().sort(() => Math.random() - 0.5);
  // make sure answer is in there
  if (!shuffled.includes(q.a)) shuffled[0] = q.a;

  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(btn, opt, q);
    opts.appendChild(btn);
  });

  // reset feedback
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  document.getElementById('nextBtn').style.display = 'none';
}

function selectAnswer(btn, chosen, q) {
  if (state.answered) return;
  state.answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.disabled = true; });

  const isCorrect = chosen === q.a;
  const fb = document.getElementById('feedbackBar');

  if (isCorrect) {
    btn.classList.add('correct');
    fb.className = 'feedback-bar correct-fb';
    document.getElementById('fbIcon').textContent = '✅';
    document.getElementById('fbMain').textContent = 'Muito bem!';
    document.getElementById('fbSub').textContent = '';
    state.score++;
  } else {
    btn.classList.add('wrong');
    // highlight correct
    allBtns.forEach(b => {
      if (b.textContent.includes(q.a)) b.classList.add('correct');
    });
    fb.className = 'feedback-bar wrong-fb';
    document.getElementById('fbIcon').textContent = '❌';
    document.getElementById('fbMain').textContent = 'Não foi dessa vez!';
    document.getElementById('fbSub').textContent = `Resposta certa: ${q.a}`;
    // save error
    saveError(q, chosen);
  }

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const total = state.questions.length;
  const score = state.score;
  const grade = ((score / total) * 10).toFixed(1);
  const pct = score / total;

  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultScore').textContent = `${score} de ${total} certas`;

  let emoji = '😔';
  if (pct >= 0.9) emoji = '🏆';
  else if (pct >= 0.7) emoji = '⭐';
  else if (pct >= 0.5) emoji = '💪';
  document.getElementById('resultEmoji').textContent = emoji;

  // color grade
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.style.color = pct >= 0.7 ? 'var(--correct)' : (pct >= 0.5 ? 'var(--his)' : 'var(--wrong)');

  showScreen('screenResult');
}

function retryQuiz() {
  startQuiz(state.mode);
}

function quitQuiz() {
  if (lastDisc) showTopics(lastDisc);
  else showMainMenu();
}

// ════════════════════════════════════════════
//  ERROR LOG
// ════════════════════════════════════════════

function saveError(q, chosen) {
  const err = {
    ts: Date.now(),
    disc: state.disc,
    topic: state.topic.name,
    q: q.q,
    chosen,
    correct: q.a,
  };
  // avoid exact dupes
  const already = state.errors.findIndex(e => e.q === q.q);
  if (already >= 0) state.errors[already] = err;
  else state.errors.push(err);
  localStorage.setItem('alice_errors', JSON.stringify(state.errors));
}

function showErrors() {
  const list = document.getElementById('errorLogList');
  list.innerHTML = '';
  const discColors = { mat:'tag-mat', sci:'tag-sci', his:'tag-his', geo:'tag-geo' };
  const discNames  = { mat:'Matemática', sci:'Science', his:'História', geo:'Geografia' };

  if (state.errors.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="es-emoji">🌟</span>Nenhum erro registrado!<br>Continue estudando!</div>`;
  } else {
    state.errors.slice().reverse().forEach((err, i) => {
      const item = document.createElement('div');
      item.className = 'error-item';
      item.innerHTML = `
        <div class="ei-q">${err.q} <span class="tag ${discColors[err.disc] || ''}">${discNames[err.disc]||''}</span></div>
        <div class="ei-row wrong-ans"><span class="ei-label">Você:</span>${err.chosen}</div>
        <div class="ei-row right-ans"><span class="ei-label">Certo:</span>${err.correct}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">${err.topic}</div>
      `;
      list.appendChild(item);
    });
    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-errors-btn';
    clearBtn.textContent = '🗑️ Limpar todos os erros';
    clearBtn.onclick = clearErrors;
    list.appendChild(clearBtn);
  }
  showScreen('screenErrors');
}

function clearErrors() {
  state.errors = [];
  localStorage.removeItem('alice_errors');
  showErrors();
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
