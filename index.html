<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Adventure ⭐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --sky:#5B9EF5; --sky-l:#EBF3FF;
  --sun:#FFB830; --sun-l:#FFF4D6;
  --grass:#4DC87A; --grass-l:#E6FAF0;
  --berry:#F56B8A; --berry-l:#FFF0F3;
  --purple:#9B6EF3; --purple-l:#F3EEFF;
  --teal:#2ABFBF; --teal-l:#E0FAFA;
  --orange:#FF7043; --orange-l:#FFF3EF;
  --pink:#E91E8C; --pink-l:#FFE8F5;
  --indigo:#5C6BC0; --indigo-l:#ECEEFF;
  --bg:#F7F9FF; --card:#fff; --text:#1E1E2E; --muted:#8892A4;
  --radius:20px; --shadow:0 4px 20px rgba(91,158,245,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* HOME */
#home{align-items:center;justify-content:flex-start;padding:32px 20px 40px;background:linear-gradient(160deg,#EBF3FF 0%,#F7F9FF 60%);gap:0;overflow-y:auto}
.hero{text-align:center;margin-bottom:28px}
.hero-emoji{font-size:72px;animation:bob 2.4s ease-in-out infinite;display:block;margin-bottom:8px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-title{font-size:34px;font-weight:900;line-height:1.1;margin-bottom:6px}
.home-title span{color:var(--sky)}
.home-sub{font-size:15px;color:var(--muted);font-weight:600}
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px}
.subject-card{background:var(--card);border-radius:18px;padding:16px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;box-shadow:var(--shadow);cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;text-align:left}
.subject-card:active{transform:scale(.96)}
.s-icon{font-size:32px;line-height:1}
.s-title{font-size:15px;font-weight:900;line-height:1.2}
.s-desc{font-size:11px;color:var(--muted);font-weight:600}
.subject-card.c0{border-color:var(--sky)}
.subject-card.c1{border-color:var(--sun)}
.subject-card.c2{border-color:var(--grass)}
.subject-card.c3{border-color:var(--berry)}
.subject-card.c4{border-color:var(--purple)}
.subject-card.c5{border-color:var(--teal)}
.subject-card.c6{border-color:var(--orange)}
.subject-card.c7{border-color:var(--pink)}
.subject-card.c8{border-color:var(--indigo)}

/* GAME HEADER */
.game-header{background:var(--card);padding:12px 16px 10px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:0;z-index:10;flex-shrink:0}
.back-btn{background:var(--sky-l);border:none;border-radius:12px;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.game-title{font-size:15px;font-weight:900;flex:1}
.score-pill{background:var(--sun-l);border-radius:20px;padding:5px 11px;font-size:13px;font-weight:800;color:#B8860B;display:flex;align-items:center;gap:3px;white-space:nowrap}
.progress-wrap{padding:8px 16px 0;background:var(--card);flex-shrink:0}
.progress-bar{height:7px;background:#E8EDFB;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--purple));border-radius:99px;transition:width .5s ease}
.progress-label{font-size:11px;color:var(--muted);font-weight:700;text-align:right;padding:3px 0 6px}

/* QUESTION AREA */
.question-area{flex:1;padding:16px 16px 28px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.q-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow)}
.q-label{font-size:12px;font-weight:800;color:var(--sky);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.q-text{font-size:19px;font-weight:900;line-height:1.3}
.q-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px}

/* OPTIONS */
.options-grid{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--card);border:3px solid #E8EDFB;border-radius:14px;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s,transform .12s;text-align:left;width:100%}
.opt-btn:active{transform:scale(.98)}
.opt-btn.correct{border-color:var(--grass);background:var(--grass-l)}
.opt-btn.wrong{border-color:var(--berry);background:var(--berry-l)}
.opt-dot{width:30px;height:30px;border-radius:50%;background:var(--sky-l);color:var(--sky);font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt-btn.correct .opt-dot{background:var(--grass);color:#fff}
.opt-btn.wrong .opt-dot{background:var(--berry);color:#fff}

/* MINI ARRAY */
.mini-array{display:flex;flex-direction:column;gap:3px}
.mini-row{display:flex;gap:3px}
.mini-dot{width:13px;height:13px;border-radius:50%;opacity:.8}

/* NEXT BTN */
.next-btn{background:var(--sky);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;width:100%;display:none;margin-top:2px;box-shadow:0 4px 16px rgba(91,158,245,.4);transition:transform .12s}
.next-btn:active{transform:scale(.98)}
.next-btn.visible{display:block}

/* ARRAY DOTS */
.array-dot{width:24px;height:24px;border-radius:50%}
.array-dot.sky{background:var(--sky)}
.array-dot.sun{background:var(--sun)}
.array-dot.grass{background:var(--grass)}
.array-dot.berry{background:var(--berry)}
.array-dot.purple{background:var(--purple)}
.array-dot.teal{background:var(--teal)}
.array-row{display:flex;gap:5px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--grass);color:#fff;border-radius:14px;padding:12px 22px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(77,200,122,.35);transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;opacity:0;z-index:100;white-space:nowrap}
.toast.wrong-t{background:var(--berry);box-shadow:0 8px 32px rgba(245,107,138,.35)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* NUMBER INPUT */
.num-input{width:100%;padding:11px 12px;border:3px solid #E8EDFB;border-radius:12px;font-size:20px;font-weight:900;font-family:'Nunito',sans-serif;outline:none;text-align:center;color:var(--text);background:#fff}
.num-input:focus{border-color:var(--sky)}

/* RESULTS */
#results{align-items:center;justify-content:center;padding:36px 20px;background:linear-gradient(160deg,#EBF3FF 0%,#F7F9FF 70%);text-align:center;gap:0;overflow-y:auto}
.res-emoji{font-size:88px;margin-bottom:10px}
.res-title{font-size:28px;font-weight:900;margin-bottom:4px}
.res-sub{font-size:15px;color:var(--muted);font-weight:600;margin-bottom:24px}
.stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
.star{font-size:44px;opacity:.2;transition:opacity .4s,transform .4s}
.star.lit{opacity:1;transform:scale(1.15)}
.res-card{background:var(--card);border-radius:var(--radius);padding:18px 24px;width:100%;max-width:340px;box-shadow:var(--shadow);margin-bottom:24px}
.res-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
.res-stat+.res-stat{border-top:1px solid #F0F3FA}
.res-stat .sl{font-size:14px;font-weight:700;color:var(--muted)}
.res-stat .sv{font-size:19px;font-weight:900}
.grade-box{background:var(--sun-l);border-radius:16px;padding:16px 24px;margin-bottom:20px;width:100%;max-width:340px}
.grade-label{font-size:13px;font-weight:700;color:#B8860B;margin-bottom:4px}
.grade-num{font-size:52px;font-weight:900;color:#B8860B;line-height:1}
.grade-desc{font-size:14px;font-weight:700;color:#B8860B;margin-top:2px}
.play-btn{background:var(--sky);color:#fff;border:none;border-radius:14px;padding:14px 36px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(91,158,245,.4);margin-bottom:10px}
.home-btn-link{background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}

/* MODULE SELECT */
#module-select{align-items:center;justify-content:flex-start;padding:20px 16px 36px;background:linear-gradient(160deg,#EBF3FF 0%,#F7F9FF 60%);overflow-y:auto}
.ms-header{display:flex;align-items:center;gap:10px;margin-bottom:24px;width:100%}
.ms-back{background:var(--sky-l);border:none;border-radius:12px;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ms-title{font-size:18px;font-weight:900}
.mode-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.mode-card{background:var(--card);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;text-align:left}
.mode-card:active{transform:scale(.97)}
.mode-icon{font-size:36px;flex-shrink:0}
.mode-info h3{font-size:16px;font-weight:900}
.mode-info p{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}

/* TALLY */
.tally-mark{font-size:22px;font-weight:900;letter-spacing:-2px;color:var(--text)}

/* MONEY */
.money-item{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800}
.money-coin{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}

/* Comparison */
.cmp-number{font-size:36px;font-weight:900;color:var(--sky);text-align:center;margin:8px 0}
.cmp-symbol{font-size:28px;font-weight:900;color:var(--muted);text-align:center}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="hero">
    <span class="hero-emoji">🎓</span>
    <h1 class="home-title">Math<br><span>Adventure</span></h1>
    <p class="home-sub">Choose a topic to practice!</p>
  </div>
  <div class="subject-grid" id="subject-grid"></div>
</div>

<!-- MODULE SELECT -->
<div id="module-select" class="screen">
  <div class="ms-header">
    <button class="ms-back" onclick="goHome()">←</button>
    <div class="ms-title" id="ms-title">Choose a mode</div>
  </div>
  <div class="mode-cards" id="mode-cards"></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title" id="game-title"></div>
    <div class="score-pill">⭐ <span id="score-display">0</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">Question 1 of 8</div>
  </div>
  <div class="question-area" id="question-area"></div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="res-emoji" id="res-emoji">🎉</div>
  <div class="res-title" id="res-title">Amazing!</div>
  <div class="res-sub" id="res-sub">You're a superstar!</div>
  <div class="stars-row">
    <div class="star" id="s1">⭐</div>
    <div class="star" id="s2">⭐</div>
    <div class="star" id="s3">⭐</div>
  </div>
  <div class="grade-box">
    <div class="grade-label">Your simulated grade</div>
    <div class="grade-num" id="grade-num">10</div>
    <div class="grade-desc" id="grade-desc">Outstanding!</div>
  </div>
  <div class="res-card">
    <div class="res-stat"><span class="sl">Correct</span><span class="sv" id="r-correct">0</span></div>
    <div class="res-stat"><span class="sl">Total</span><span class="sv" id="r-total">0</span></div>
    <div class="res-stat"><span class="sl">Score</span><span class="sv" id="r-score">0 ⭐</span></div>
  </div>
  <button class="play-btn" id="play-again-btn">Play Again 🔁</button>
  <button class="home-btn-link" onclick="goHome()">← Back to Home</button>
</div>

<div class="toast" id="toast">✅ Correct!</div>

<script>
// ── SUBJECTS ────────────────────────────────────────────────────────────────
const SUBJECTS = [
  { id:'arrays',   icon:'🔢', title:'Arrays',           desc:'Multiplication with dot arrays', color:'c0' },
  { id:'addition', icon:'➕', title:'Addition',          desc:'Number pairs & multi-step', color:'c1' },
  { id:'equal',    icon:'⚖️', title:'Equal or Not',      desc:'Same value, different forms', color:'c2' },
  { id:'place',    icon:'🏠', title:'Tens & Ones',       desc:'Place value & compare numbers', color:'c3' },
  { id:'tally',    icon:'📊', title:'Tally & Graphs',    desc:'Read charts and block graphs', color:'c4' },
  { id:'time',     icon:'📅', title:'Days & Months',     desc:'Calendar and time', color:'c5' },
  { id:'money',    icon:'💰', title:'Money',             desc:'Dollars and cents', color:'c6' },
  { id:'chance',   icon:'🎲', title:'Probability',       desc:'Good, small, equal chance', color:'c7' },
  { id:'pictogram',icon:'📈', title:'Pictograms',        desc:'Read picture graphs', color:'c8' },
];

const MODES = {
  arrays:    [{id:'match',  icon:'🔗', title:'Match It!',            desc:'Match the array to its description'},
              {id:'circle', icon:'⭕', title:'Pick the Right Array',  desc:'Choose which array matches the multiplication'},
              {id:'write',  icon:'✏️', title:'Read the Array',        desc:'Count rows and columns, write the equation'}],
  addition:  [{id:'circle', icon:'⭕', title:'Circle the Answer',     desc:'Choose the correct total'},
              {id:'write',  icon:'✏️', title:'Complete the Sentence', desc:'Fill in the missing number'}],
  equal:     [{id:'circle', icon:'⭕', title:'Are They Equal?',       desc:'Pick which expressions are equal'},
              {id:'write',  icon:'✏️', title:'Find the Match',        desc:'Write the matching value'}],
  place:     [{id:'circle', icon:'⭕', title:'Tens & Ones Quiz',      desc:'Identify the place value'},
              {id:'write',  icon:'✏️', title:'Compare Numbers',       desc:'Use > or < to compare'}],
  tally:     [{id:'circle', icon:'⭕', title:'Read the Tally',        desc:'Count tally marks and answer'},
              {id:'circle2',icon:'📊', title:'Read the Bar Graph',    desc:'Answer questions about bar graphs'}],
  time:      [{id:'circle', icon:'📅', title:'Days Quiz',             desc:'Order and identify days & months'},
              {id:'write',  icon:'✏️', title:'Months Quiz',           desc:'What comes before or after?'}],
  money:     [{id:'circle', icon:'💰', title:'Money Values',          desc:'Match amounts to descriptions'},
              {id:'write',  icon:'✏️', title:'Count the Money',       desc:'Add up dollars and cents'}],
  chance:    [{id:'circle', icon:'🎲', title:'What\'s the Chance?',   desc:'Good, small or equal chance?'}],
  pictogram: [{id:'circle', icon:'📈', title:'Read the Pictogram',    desc:'Answer questions from picture charts'}],
};

// ── QUESTIONS ──────────────────────────────────────────────────────────────
const Q = {};

Q.arrays_match = [
  {rows:3,cols:4,label:'3 groups of 4',color:'sky'},
  {rows:2,cols:6,label:'2 groups of 6',color:'sun'},
  {rows:5,cols:2,label:'5 groups of 2',color:'grass'},
  {rows:4,cols:3,label:'4 groups of 3',color:'berry'},
  {rows:3,cols:5,label:'3 groups of 5',color:'purple'},
  {rows:2,cols:8,label:'2 groups of 8',color:'teal'},
  {rows:6,cols:2,label:'6 groups of 2',color:'sky'},
  {rows:4,cols:5,label:'4 groups of 5',color:'sun'},
];

Q.arrays_circle = [
  {mult:'3 × 4',rows:3,cols:4,answer:0,color:'sky',   opts:[{r:3,c:4},{r:2,c:5},{r:4,c:3}]},
  {mult:'5 × 3',rows:5,cols:3,answer:1,color:'berry', opts:[{r:3,c:4},{r:5,c:3},{r:3,c:6}]},
  {mult:'2 × 8',rows:2,cols:8,answer:2,color:'sun',   opts:[{r:4,c:4},{r:3,c:5},{r:2,c:8}]},
  {mult:'4 × 4',rows:4,cols:4,answer:0,color:'purple',opts:[{r:4,c:4},{r:2,c:8},{r:8,c:2}]},
  {mult:'6 × 2',rows:6,cols:2,answer:1,color:'grass', opts:[{r:3,c:4},{r:6,c:2},{r:2,c:6}]},
  {mult:'3 × 6',rows:3,cols:6,answer:2,color:'teal',  opts:[{r:6,c:3},{r:2,c:9},{r:3,c:6}]},
  {mult:'5 × 4',rows:5,cols:4,answer:0,color:'sky',   opts:[{r:5,c:4},{r:4,c:5},{r:2,c:10}]},
  {mult:'7 × 2',rows:7,cols:2,answer:1,color:'berry', opts:[{r:2,c:7},{r:7,c:2},{r:4,c:3}]},
];

Q.arrays_write = [
  {rows:3,cols:5,color:'purple',rL:3,cL:5,tot:15},
  {rows:4,cols:4,color:'sun',   rL:4,cL:4,tot:16},
  {rows:6,cols:3,color:'sky',   rL:6,cL:3,tot:18},
  {rows:2,cols:7,color:'grass', rL:2,cL:7,tot:14},
  {rows:5,cols:5,color:'berry', rL:5,cL:5,tot:25},
  {rows:3,cols:6,color:'teal',  rL:3,cL:6,tot:18},
  {rows:4,cols:6,color:'sky',   rL:4,cL:6,tot:24},
  {rows:2,cols:9,color:'sun',   rL:2,cL:9,tot:18},
];

Q.addition_circle = [
  {q:'6 + 2 + 4 = ?',  answer:12, opts:[10,12,14]},
  {q:'5 + 2 + 8 = ?',  answer:15, opts:[13,15,17]},
  {q:'3 + 4 + 7 = ?',  answer:14, opts:[12,14,16]},
  {q:'8 + 3 + 2 + 3 = ?', answer:16, opts:[14,16,18]},
  {q:'9 + 6 + 4 + 3 + 1 = ?', answer:23, opts:[21,23,25]},
  {q:'4 + 7 + 3 + 5 = ?', answer:19, opts:[17,19,21]},
  {q:'5 + 7 + 2 + 3 = ?', answer:17, opts:[15,17,19]},
  {q:'8 + 5 + 3 + 2 = ?', answer:18, opts:[16,18,20]},
];

Q.addition_write = [
  {q:'65 + 4 = ?',  answer:69},
  {q:'82 − 3 = ?',  answer:79},
  {q:'3 + 8 + 7 + 1 = ?', answer:19},
  {q:'54 + 30 = ?', answer:84},
  {q:'51 − 30 = ?', answer:21},
  {q:'60 − 40 = ?', answer:20},
  {q:'10 + 49 = ?', answer:59},
  {q:'45 + 31 = ?', answer:76},
];

Q.equal_circle = [
  {q:'18 + 2 = ?', answer:20, opts:[18,20,22], note:'Which value equals the other side?'},
  {q:'8 + 7 = ?',  answer:15, opts:[13,15,17], note:''},
  {q:'25 − 5 = ?', answer:20, opts:[18,20,22], note:''},
  {q:'15 − 6 = ?', answer:9,  opts:[7,9,11],  note:''},
  {q:'19 − 4 = ?', answer:15, opts:[13,15,17], note:''},
  {q:'4 + 6 = ?',  answer:10, opts:[8,10,12],  note:''},
  {q:'28 − 9 = ?', answer:19, opts:[17,19,21], note:''},
  {q:'8 + 9 = ?',  answer:17, opts:[15,17,19], note:''},
];

Q.equal_write = [
  {q:'15 + 2 = ___ − 3  (what result do both equal?)', answer:17},
  {q:'25 − 7 = 12 + ___', answer:6},
  {q:'4 + 6 = ___ − 0', answer:10},
  {q:'13 + 2 = 17 − ___', answer:2},
  {q:'16 − 9 = 6 + ___', answer:1},
  {q:'23 − 8 = ___ − 1', answer:16},
  {q:'14 + 3 = 7 + ___', answer:10},
  {q:'22 − 4 = 9 + ___', answer:9},
];

Q.place_circle = [
  {q:'What is the value of the TENS digit in 76?', answer:70, opts:[7,70,76]},
  {q:'What is the value of the ONES digit in 43?', answer:3,  opts:[3,40,43]},
  {q:'Which number has 6 tens and 0 ones?',        answer:60, opts:[6,60,66]},
  {q:'Which is the biggest? 15 / 69 / 73 / 48',   answer:73, opts:[69,73,48]},
  {q:'Which is the smallest? 63 / 65 / 69 / 62',  answer:62, opts:[62,63,65]},
  {q:'How many tens in 58?',                        answer:5,  opts:[5,8,58]},
  {q:'What number has 4 tens and 6 ones?',         answer:46, opts:[40,46,64]},
  {q:'Which is bigger: 74 or 47?',                 answer:74, opts:[47,74,'equal']},
];

Q.place_write = [
  {q:'85 > ___  (write any smaller number)',  answer:84, flex:true, hint:'Any number less than 85'},
  {q:'63 < ___  (write any bigger number)',   answer:64, flex:true, hint:'Any number greater than 63'},
  {q:'16 < ___',  answer:17, flex:true, hint:'Any number greater than 16'},
  {q:'74 < ___',  answer:75, flex:true, hint:'Any number greater than 74'},
  {q:'58 > ___',  answer:57, flex:true, hint:'Any number less than 58'},
  {q:'73 < ___',  answer:74, flex:true, hint:'Any number greater than 73'},
  {q:'82 < ___',  answer:83, flex:true, hint:'Any number greater than 82'},
  {q:'14 > ___',  answer:13, flex:true, hint:'Any number less than 14'},

// ── NAV ──────────────────────────────────────────────────────────────────────
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ show('home'); }

function selectSubject(id){
  curSubject = id;
  const s = SUBJECTS.find(x=>x.id===id);
  document.getElementById('ms-title').textContent = s.icon + ' ' + s.title;
  const mc = document.getElementById('mode-cards');
  mc.innerHTML = '';
  const modes = MODES[id];
  modes.forEach(m => {
    const el = document.createElement('div');
    const colorVar = s.color.replace('c','');
    const colors = ['sky','sun','grass','berry','purple','teal','orange','pink','indigo'];
    const col = colors[parseInt(s.color.substring(1))] || 'sky';
    el.className = 'mode-card';
    el.style.borderColor = `var(--${col})`;
    el.innerHTML = `<div class="mode-icon">${m.icon}</div><div class="mode-info"><h3>${m.title}</h3><p>${m.desc}</p></div>`;
    el.onclick = () => startGame(id, m.id, m.title);
    mc.appendChild(el);
  });
  show('module-select');
}

function startGame(subject, mode, title){
  curSubject=subject; curMode=mode; curIdx=0; score=0; correct=0; answered=false;
  document.getElementById('game-title').textContent = title;
  document.getElementById('score-display').textContent = '0';

  // pick question set
  const key = subject + '_' + mode;
  const raw = Q[key];
  if(!raw){ alert('Coming soon!'); return; }
  questions = shuffle([...raw]);
  show('game');
  renderQ();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderQ(){
  answered = false;
  const q = questions[curIdx];
  const total = questions.length;
  document.getElementById('progress-fill').style.width = (curIdx/total*100)+'%';
  document.getElementById('progress-label').textContent = `Question ${curIdx+1} of ${total}`;
  document.getElementById('score-display').textContent = score;
  const area = document.getElementById('question-area');
  area.innerHTML = '';

  const key = curSubject + '_' + curMode;
  if(key==='arrays_match') renderArrayMatch(area,q);
  else if(key==='arrays_circle') renderArrayCircle(area,q);
  else if(key==='arrays_write') renderArrayWrite(area,q);
  else if(key.endsWith('_circle') || key.endsWith('_circle2')) renderMCQ(area,q);
  else if(key.endsWith('_write')) renderWrite(area,q);
}

// ── ARRAY MATCH ───────────────────────────────────────────────────────────────
function renderArrayMatch(area,q){
  const all = Q.arrays_match.map(x=>x.label);
  const wrongs = shuffle(all.filter(l=>l!==q.label)).slice(0,3);
  const opts = shuffle([q.label,...wrongs]);
  area.innerHTML=`
    <div class="q-card">
      <div class="q-label">Match It!</div>
      <div class="q-text">What is this array?</div>
      <div class="q-sub">Count the rows and columns 👇</div>
      <div style="margin-top:14px">${buildArray(q.rows,q.cols,q.color)}</div>
    </div>
    <div class="options-grid" id="opts"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">Next →</button>`;
  const g=document.getElementById('opts');
  const L=['A','B','C','D'];
  opts.forEach((label,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn'; b.dataset.label=label;
    b.innerHTML=`<div class="opt-dot">${L[i]}</div><span>${label}</span>`;
    b.onclick=()=>checkMatch(b,label===q.label,q.label);

}
function checkMatch(btn,ok,correctLabel){
  if(answered)return; answered=true;
  document.querySelectorAll('#opts .opt-btn').forEach(b=>{ if(b.dataset.label===correctLabel){ b.classList.add('correct'); b.querySelector('.opt-dot').textContent='✓'; }});
  if(ok){score+=10;correct++;toast('✅ Correct! +10',false);}
  else{btn.classList.add('wrong');btn.querySelector('.opt-dot').textContent='✗';toast('❌ Not quite!',true);}
  updateScore(); showNext();
}

function checkWriteGeneric(){
  if(answered)return;
  const q=questions[curIdx];
  const inp=document.getElementById('wans');
  const val=inp.value.trim().toLowerCase();
  if(!val){toast('⚠️ Write your answer!',true);return;}
  answered=true;
  let ok=false;
  if(q.flex){
    // for comparisons, accept any valid answer
    const num=parseFloat(val);
    if(q.q.includes('>')){ok=!isNaN(num)&&num<q.answer;}
    else if(q.q.includes('<')){ok=!isNaN(num)&&num>q.answer;}
    else ok=String(val)===String(q.answer).toLowerCase();
  } else if(q.display){
    ok=val===q.display.toLowerCase()||val===q.answer.toLowerCase();
  } else {
    ok=parseFloat(val)===parseFloat(q.answer)||val===String(q.answer).toLowerCase();
  }
  const fb=document.getElementById('wfb2');
  fb.style.display='block';
  inp.style.borderColor=ok?'var(--grass)':'var(--berry)';
  inp.style.background=ok?'var(--grass-l)':'var(--berry-l)';
  if(ok){fb.style.color='var(--grass)';fb.textContent='🎉 Correct!';score+=10;correct++;toast('✅ Correct! +10',false);}
  else{fb.style.color='var(--berry)';fb.textContent=`Answer: ${q.display||q.answer}`;toast('❌ Almost!',true);}
  updateScore(); showNext();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function buildArray(rows,cols,color){
  let h='<div style="display:flex;flex-direction:column;gap:5px">';
  for(let r=0;r<rows;r++){
    h+='<div class="array-row">';
    for(let c=0;c<cols;c++) h+=`<div class="array-dot ${color}"></div>`;
    h+='</div>';
  }
  return h+'</div>';
}
function buildMiniArray(rows,cols,color){
  let h='<div class="mini-array">';
  for(let r=0;r<rows;r++){
    h+='<div class="mini-row">';
    for(let c=0;c<cols;c++) h+=`<div class="mini-dot" style="background:var(--${color})"></div>`;
    h+='</div>';
  }
  return h+'</div>';
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function updateScore(){document.getElementById('score-display').textContent=score;}
function showNext(){document.getElementById('nxt').classList.add('visible');}
function nextQ(){
  curIdx++;
  if(curIdx>=questions.length) showResults();
  else renderQ();
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults(){
  const total=questions.length;
  const pct=correct/total;
  const grade=Math.round(pct*10*10)/10;

  let emoji,title,sub,desc;
  if(pct===1){emoji='🏆';title='Perfect Score!';sub='You got every one right!';}
  else if(pct>=.8){emoji='🌟';title='Excellent!';sub='You\'re almost perfect!';}
  else if(pct>=.6){emoji='😊';title='Good Job!';sub='Keep practicing!';}
  else if(pct>=.4){emoji='💪';title='Keep Trying!';sub='You can do better!';}
  else{emoji='📚';title='Need More Practice';sub='Review the topic and try again!';}

  if(grade>=9)desc='Outstanding! 🏆';
  else if(grade>=7)desc='Great work! 🌟';
  else if(grade>=5)desc='Good effort! 😊';
  else desc='Keep studying! 💪';

  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-sub').textContent=sub;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-total').textContent=total;
  document.getElementById('r-score').textContent=score+' ⭐';
  document.getElementById('grade-num').textContent=grade.toFixed(1);
  document.getElementById('grade-desc').textContent=desc;

  ['s1','s2','s3'].forEach(id=>document.getElementById(id).classList.remove('lit'));
  setTimeout(()=>{
    if(pct>=.4)document.getElementById('s1').classList.add('lit');
    setTimeout(()=>{
      if(pct>=.7)document.getElementById('s2').classList.add('lit');
      setTimeout(()=>{if(pct===1)document.getElementById('s3').classList.add('lit');},300);
    },300);
  },400);

  document.getElementById('play-again-btn').onclick=()=>startGame(curSubject,curMode,document.getElementById('game-title').textContent);
  show('results');
}

// fix array circle correct count
function checkArrayCircle(chosen,correctIdx){
  if(answered)return; answered=true;
  const btns=document.querySelectorAll('#opts .opt-btn');
  btns[correctIdx].classList.add('correct'); btns[correctIdx].querySelector('.opt-dot').textContent='✓';
  if(chosen!==correctIdx){btns[chosen].classList.add('wrong');btns[chosen].querySelector('.opt-dot').textContent='✗';toast('❌ The correct one is highlighted',true);}
  else{score+=10;correct++;toast('✅ Correct! +10',false);}
  updateScore(); showNext();
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg,isWrong){
  const t=document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent=msg;
  t.className='toast'+(isWrong?' wrong-t':'');
  void t.offsetWidth;
  t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
